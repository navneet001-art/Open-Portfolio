# Application configuration
spring.application.name=resume-maker

# =================== MySQL / MariaDB ===================
spring.datasource.url=jdbc:mysql://localhost:3306/openportfoliodb?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Kolkata
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=openportfolio
spring.datasource.password=openportfolio123

# =================== JPA / Hibernate ===================
spring.jpa.database-platform=org.hibernate.dialect.MariaDBDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# =================== Thymeleaf ===================
spring.thymeleaf.cache=false
spring.thymeleaf.suffix=.html
spring.thymeleaf.encoding=UTF-8

# =================== Server ===================
server.port=8080

# =================== File Upload ===================
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
