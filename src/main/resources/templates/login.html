<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login – OpenPortfolio</title>
    <meta name="description" content="Sign in to your OpenPortfolio account." />
    <link rel="stylesheet" th:href="@{/css/main.css}" />
</head>

<body>
    <div th:replace="~{fragments/navbar :: navbar('')}"></div>

    <div class="auth-page">
        <div class="auth-box">
            <div class="auth-header">
                <div class="auth-logo">Open<span style="color:var(--primary)">Portfolio</span></div>
                <h1 class="auth-title">Welcome Back</h1>
                <p class="auth-subtitle">Sign in to manage your profile</p>
            </div>

            <div th:if="${error}" class="alert alert-danger">
                <span>⚠</span><span th:text="${error}"></span>
            </div>

            <form action="/login" method="post">
                <div class="form-group">
                    <label class="form-label" for="login-username">Username</label>
                    <input class="form-control" type="text" id="login-username" name="username"
                        placeholder="your_username" required />
                </div>
                <div class="form-group">
                    <label class="form-label" for="login-password">Password</label>
                    <input class="form-control" type="password" id="login-password" name="password"
                        placeholder="••••••••" required />
                </div>
                <button type="submit" class="btn btn-primary w-100" style="justify-content:center;margin-top:0.5rem;">
                    Sign In →
                </button>
            </form>

            <div class="auth-footer">
                Don't have an account? <a href="/register">Get started free</a>
            </div>
        </div>
    </div>
</body>

</html>
