<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register – OpenPortfolio</title>
    <meta name="description"
        content="Create your OpenPortfolio account and start building your professional profile." />
    <link rel="stylesheet" th:href="@{/css/main.css}" />
</head>

<body>
    <div th:replace="~{fragments/navbar :: navbar('')}"></div>

    <div class="auth-page">
        <div class="auth-box">
            <div class="auth-header">
                <div class="auth-logo">Open<span style="color:var(--primary)">Portfolio</span></div>
                <h1 class="auth-title">Create Account</h1>
                <p class="auth-subtitle">Start building your professional profile</p>
            </div>

            <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

            <form action="/register" method="post">
                <div class="form-group">
                    <label class="form-label" for="reg-fullname">Full Name</label>
                    <input class="form-control" type="text" id="reg-fullname" name="fullName" placeholder="John Doe"
                        required />
                </div>
                <div class="form-group">
                    <label class="form-label" for="reg-username">Username</label>
                    <input class="form-control" type="text" id="reg-username" name="username" placeholder="john_doe"
                        required pattern="[a-zA-Z0-9_]{3,30}"
                        title="3-30 characters: letters, numbers, underscores only" />
                </div>
                <div class="form-group">
                    <label class="form-label" for="reg-email">Email</label>
                    <input class="form-control" type="email" id="reg-email" name="email" placeholder="john@example.com"
                        required />
                </div>
                <div class="form-group">
                    <label class="form-label" for="reg-password">Password</label>
                    <input class="form-control" type="password" id="reg-password" name="password"
                        placeholder="Min. 6 characters" required minlength="6" />
                </div>
                <button type="submit" class="btn btn-primary w-100" style="justify-content:center;">
                    Create Account →
                </button>
            </form>

            <div class="auth-footer">
                Already have an account? <a href="/login">Sign in</a>
            </div>
        </div>
    </div>
</body>

</html>
